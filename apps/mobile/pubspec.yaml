name: neurashop_mobile
description: "E-commerce mobile app - Flutter version of NeurashopClient."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  hooks_riverpod: ^2.4.0

  # Authentication
  clerk_flutter: ^0.0.14-beta

  # HTTP Client
  dio: ^5.3.1
  http: ^1.1.0

  # Payments
  flutter_stripe: ^9.0.0

  # Local Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # JSON Serialization
  json_annotation: ^4.8.1
  json_serializable: ^6.7.1

  # Navigation
  go_router: ^13.0.0

  # UI/UX
  cached_network_image: ^3.3.0
  google_fonts: ^6.1.0
  image_picker: ^1.0.4
  intl: ^0.20.2
  flutter_dotenv: ^5.1.0

  # Networking & Utilities
  connectivity_plus: ^5.0.0
  logger: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  # Assets
  # assets:
  #   - assets/images/
  #   - assets/icons/

